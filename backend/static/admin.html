<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classivo Admin Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #09090b;
            color: #ffffff;
            height: 100vh;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background-color: #18181b;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .auth-section {
            display: flex;
            gap: 1rem;
        }
        input {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #444;
            background-color: #121214;
            color: white;
            min-width: 250px;
        }
        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger {
            background-color: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background-color: #dc2626;
        }
        .btn-primary {
            background-color: #10b981;
            color: white;
        }
        .btn-primary:hover {
            background-color: #059669;
        }
        /* Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        .card {
            background-color: #18181b;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1.5rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .card-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: #e4e4e7;
        }
        /* Table Styles */
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th {
            color: #a1a1aa;
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        td {
            color: #e4e4e7;
            font-size: 0.95rem;
        }
        .message-cell {
            max-width: 400px;
            white-space: pre-wrap;
            color: #a1a1aa;
        }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
            background-color: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            background-color: #27272a;
            color: white;
            border-left: 4px solid #3b82f6;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        #toast.visible {
            transform: translateY(0);
        }
        #toast.success { border-left-color: #10b981; }
        #toast.error { border-left-color: #ef4444; }
        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #a1a1aa;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="header">
            <h1>Classivo Admin</h1>
            <div class="auth-section">
                <input type="password" id="adminKey" placeholder="Enter Admin Key" autocomplete="off" />
                <button class="btn-danger" onclick="logoutAll()">Logout System</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <h2>Student Queries & Support</h2>
                    <button class="btn-primary" onclick="fetchQueries()">Refresh Data</button>
                </div>
                
                <div class="table-container">
                    <table id="queriesTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Student Email</th>
                                <th>Subject</th>
                                <th>Message</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="queriesBody">
                            <tr>
                                <td colspan="5" class="empty-state">Enter admin key and click Refresh Data to view queries.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <div id="toast"></div>

    <script>
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'visible ' + type;
            setTimeout(() => { toast.classList.remove('visible'); }, 4000);
        }

        async function logoutAll() {
            const key = document.getElementById('adminKey').value;
            if (!key) return showToast("Please enter the admin key", "error");

            try {
                const response = await fetch('/api/admin/logout-all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await response.json();
                if (response.ok) showToast(data.message, "success");
                else showToast(data.error || "Failed", "error");
            } catch (error) {
                showToast("Network error", "error");
            }
        }

        async function fetchQueries() {
            const key = document.getElementById('adminKey').value;
            const tbody = document.getElementById('queriesBody');
            
            if (!key) return showToast("Please enter the admin key first", "error");

            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 2rem;">Loading...</td></tr>';

            try {
                const response = await fetch('/api/admin/queries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await response.json();

                if (response.ok) {
                    if (!data || data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No queries found. Your inbox is clean!</td></tr>';
                        showToast("Refreshed. No new queries.", "success");
                        return;
                    }

                    tbody.innerHTML = '';
                    data.forEach(q => {
                        const date = new Date(q.created_at).toLocaleString();
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="white-space:nowrap; color:#a1a1aa">${date}</td>
                            <td style="font-weight:500;">${q.user_email}</td>
                            <td style="font-weight:600; color:white;">${q.subject}</td>
                            <td class="message-cell">${q.message}</td>
                            <td><span class="status-badge">${q.status || 'Open'}</span></td>
                        `;
                        tbody.appendChild(tr);
                    });
                    showToast(`Loaded ${data.length} queries successfully.`, "success");
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state" style="color:#ef4444;">Failed to load data.</td></tr>';
                    showToast(data.error || "Failed to load queries", "error");
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state" style="color:#ef4444;">Network error.</td></tr>';
                showToast("Network error", "error");
            }
        }
    </script>
</body>
</html>
